<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    {% include 'header.html' %}
    <main>
        <section id="place-details" class="place-details">
            <!-- card detail of place with title description owner price amenities -->
            <div class="place-info row">
                <h1>place title</h1>
                <p>place description</p>
                <div class="col">
                    <div>
                        <img src="" alt="Place image">
                    </div>
                    <div>
                        <p>Owner : </p>
                        <p>Price per night : $</p>
                        <p>Amenities : </p>
                    </div>
                </div> 
            </div>
        </section>

        <section id="reviews">
            <!-- Reviews will be populated dynamically -->
            <h2>Customer reviews</h2>
            <div class="review-card">
                <!-- card detail of review with author comment and star for rating -->
                <div class="card-body">
                    <!-- Étoiles -->
                    <div class="stars">
                        <!-- générées en JS en fonction du rating -->
                    </div>
                    <!-- Auteur -->
                    <p class="author">author</p>
                    <!-- Commentaire -->
                    <p class="comment">comment</p>
                </div>
            </div>
        </section>

        <section class="add-review">
            <!-- button : visible only if user logged in / trigger modal-->
             <div id="add-review">
                <button type="button" class="btn" data-bs-toggle="modal" data-bs-target="#Modal"style="display: none">Add a review
                </button>
            </div>

            <!-- Modal -->
            <div class="modal fade" id="Modal" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">Reviewing : name of place</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form id="review-form" class="form">
                                <label for="review-text">Your Review:</label>
                                <textarea id="review-text" name="review-text" required></textarea>
                                <label for="rating">Rating:</label>
                                <select id="rating" name="rating" required>
                                    <option value="">-- Select a rating --</option>
                                    <option value="1">1 ⭐</option>
                                    <option value="2">2 ⭐</option>
                                    <option value="3">3 ⭐</option>
                                    <option value="4">4 ⭐</option>
                                    <option value="5">5 ⭐</option>
                                </select>
                            </form>                   
                        </div>
                        <div class="modal-footer">
                            <button type="submit" form="review-form" class="btn">Submit Review</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
    </main>
    {% include 'footer.html' %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
