<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    {% include 'header.html' %}

    <main>
        <!-- Section hero -->
        <section class="hero" aria-labelledby="hero-title">
            <div class="hero-bg-overlay"></div>
            <div class="hero-content row">
                <h1 id="hero-title">Evadez-vous entre lacs et montagnes</h1>
                <h3 class="hero-subtitle">Trouvez le logement idéal pour vos prochains séjours</h3>
            </div>
        </section>

        <!-- Section filtre -->
        <section id="filter">
            <div class="card">
                <div class="card-body">
                    <div class="row">

                        <!-- Filtre ville -->
                        <div class="col">
                            <label class="form-label">Location</label>
                            <select class="form-select" id="filter-city">
                                <option value="">All cities</option>
                                <option value="Lyon">Lyon</option>
                                <option value="Annecy">Annecy</option>
                                <option value="Genève">Genève</option>
                            </select>
                        </div>

                        <!-- Filtre prix max -->
                        <div class="col">
                            <label class="form-label">Prix max</label>
                            <select class="form-select" id="filter-price">
                                <option value="">All prices</option>
                                <option value="50">Max 50€</option>
                                <option value="100">Max 100€</option>
                                <option value="200">Max 200€</option>
                                <option value="300">Max 300€</option>
                            </select>
                        </div>

                        <!-- Filtre rating -->
                        <div class="col">
                            <label class="form-label">Minimum rating</label>
                            <select class="form-select" id="filter-rating">
                                <option value="0">All ratings</option>
                                <option value="4">4+ ⭐</option>
                                <option value="5">5 ⭐</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Section place list-->
        <section id="places-list">
            <!-- List of places will be populated dynamically -->
			<div class="row row-cols-1 row-cols-md-3 g-4"">
                <div class="col">
                    <div class="card h-100">
                        <img src="..." class="card-img-top" alt="...">
                        <div class="card-body">
                            <h4 class="card-title">Card title</h4>
                            <p class="card-text">Price per night: €</p>
                            <a href="place.html" class="btn">View details</a>
                        </div>
                    </div>
                </div>
			</div>
        </section>
    </main>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>

</body>
</html>
