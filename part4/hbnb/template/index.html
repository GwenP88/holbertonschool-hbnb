<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

    <header>
        <nav class="container-nav">
            <div class="left"></div>
            <div class="center">
                <a class="logo" href="index.html" aria-label="Retour à l'accueil">
                    <img src="../images/logo/logo.webp" alt="Logo du site HBnB">HBnB
                </a>
            </div>
            <div class="right">
                <!-- login a transformer en logout... -->
                <a href="login.html" id="login-link" class="login-button">Login</a>
            </div>
        </nav>
    </header>

    <main>
        <!-- Section hero -->
        <section class="hero" aria-labelledby="hero-title">
            <div class="hero-bg-overlay"></div>
            <div class="hero-content row">
                <h1 id="hero-title">Evadez-vous entre lacs et montagnes</h1>
                <p class="hero-subtitle">Trouvez le logement idéal pour vos prochains séjours</p>
            </div>
        </section>

        <!-- Section filtre -->
        <div id="filter">
            <div class="card">
                <div class="card-body">
                    <div class="row">

                        <!-- Filtre ville -->
                        <div class="col">
                            <label class="form-label">Location</label>
                            <select class="form-select" id="filter-city">
                                <option value="">All cities</option>
                                <option value="Lyon">Lyon</option>
                                <option value="Annecy">Annecy</option>
                                <option value="Genève">Genève</option>
                            </select>
                        </div>

                        <!-- Filtre prix max -->
                        <div class="col">
                            <label class="form-label">Prix max</label>
                            <select class="form-select" id="filter-price">
                                <option value="">All prices</option>
                                <option value="50">Max 50€</option>
                                <option value="100">Max 100€</option>
                                <option value="200">Max 200€</option>
                                <option value="300">Max 300€</option>
                            </select>
                        </div>

                        <!-- Filtre rating -->
                        <div class="col">
                            <label class="form-label">Minimum rating</label>
                            <select class="form-select" id="filter-rating">
                                <option value="0">All ratings</option>
                                <option value="4">4+ ⭐</option>
                                <option value="5">5 ⭐</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section place list-->
        <div id="places-list">
            <!-- List of places will be populated dynamically -->
			<div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col">
                    <div class="card h-100 place-card">
                        <img src="../images/places/place_default.webp" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h2 class="card-title">Card title</h2>
                            <p class="card-text">Price per night: €</p>
                            <a href="place.html" class="btn details-button">View details</a>
                        </div>
                    </div>
                </div>
			</div>
        </div>
    </main>

    <footer>
        <div class="left">
            <a class="logo" href="index.html" aria-label="Retour à l'accueil">
                <img src="../images/logo/logo_bis.webp" alt="Logo du site HBnB">
            </a>
        </div>
        <div class="center">
            <p class="footer-copyright"> © <strong>HBnB 2026 - New Generation</strong> — All rights reserved</p>
        </div>
        <div class="right">
            <a href="https://instagram.com/">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://facebook.com/">
                <i class="fa-brands fa-facebook"></i>
            </a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/scripts.js"></script>

</body>
</html>
